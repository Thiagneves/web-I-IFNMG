<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contatos</title>
</head>
<body>
    <a href="/Projeto-Revisao/atividade14/portfolio.html">Principal</a>
    <a href="/Projeto-Revisao/atividade14/sobremim.html">Sobre mim</a>
    <a href="/Projeto-Revisao/atividade14/meusprojetos.html">Meus Projetos</a>
    <a href="/Projeto-Revisao/atividade14/habilidades.html">Habilidades</a>

    <h1>Contatos:</h1>
    <fieldset>
        <legend>Formulario</legend>
        <form action="" method="post">
            <div>
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome">
            </div>
            <br>
            <div>
                <label for="email">E-mail:</label>
                <input type="email" name="email" id="email">
            </div>
            <br>
            <div>
                <label for="idade">Idade:</label>
                <input type="number" id="idade" name="idade">
            </div>
            <br>
            <div>
                <label for="dataNascimento">Data de Nascimento:</label>
                <input type="date" id="dataNascimento" name="dataNascimento">
            </div>
            <br>
            <div>
                <label for="telefone">Telefone:</label>
                <input type="tel" id="telefone" name="telefone">
            </div>
            <br>
            <div>
                <label for="observacao">Observações:</label>
                <br>
                <textarea name="observacao" id="observacao" cols="40" rows="4"></textarea>
            </div>
            <br>
            <div>
                <input type="submit" value="Enviar">
                <input type="reset" value="Limpar">
            </div>
    </fieldset>
</body>
</html>
